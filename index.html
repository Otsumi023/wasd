<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>物理眺めマシン (￣▽￣)</title>
<style>
    html, body { 
        margin: 0; 
        padding: 0;
        overflow: hidden; 
        /* 最強の透過設定 (￣▽￣) */
        background-color: rgba(0, 0, 0, 0) !important; 
    }
    canvas {
        background-color: rgba(0, 0, 0, 0) !important;
    }
</style>
</head>
<body>
    <div id="ui">ただ眺めるだけの時間( ˙-˙ )</div>
    <script src="matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
        const engine = Engine.create();
        const world = engine.world;
        const width = window.innerWidth;
        const height = window.innerHeight;

        engine.gravity.y = 1.0;

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width, height, wireframes: false, background: 'transparent' }
        });
        Render.run(render);
        Runner.run(Runner.create(), engine);

        // 壁の設定
        const wallOpt = { isStatic: true, restitution: 0.8, friction: 0.1, render: { visible: false } };
        Composite.add(world, [
            Bodies.rectangle(width/2, height+40, width, 100, wallOpt), // 床
            Bodies.rectangle(-20, height/2, 40, height*10, wallOpt),   // 左壁
            Bodies.rectangle(width+20, height/2, 40, height*10, wallOpt) // 右壁
        ]);

        // ターゲット（真ん中に配置）
        const targetSize = 80;
        let target = Bodies.rectangle(width/2, height-100, targetSize, targetSize, {
            frictionAir: 0.002, restitution: 1.0, label: 'target',
            render: { sprite: { texture: 'target.png', xScale: targetSize/100, yScale: targetSize/100 } }
        });
        Body.setStatic(target, true);
        Composite.add(world, target);

        // 絵文字リスト ( ◜ω◝ )
        const emojis = ['❤️', '✨', '🔥', '🚀', '💎', '⭐', '🎉', '🐱', '🎮', '🍺', '🌈', '👻'];
        const emojiCache = {};

        function spawnRandomEmoji() {
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            if(!emojiCache[emoji]) {
                const cvs = document.createElement('canvas');
                cvs.width = 64; cvs.height = 64;
                const ctx = cvs.getContext('2d');
                ctx.font = '50px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif'; 
                ctx.textBaseline = 'middle'; 
                ctx.textAlign = 'center';
                ctx.fillText(emoji, 32, 32);
                emojiCache[emoji] = cvs.toDataURL();
            }
            
            // 【修正ポイント】ターゲットの真上のX座標を取得し、少しだけ左右にバラけさせる ( ◜ω◝ )
            const xPos = target.position.x + (Math.random() - 0.5) * 40; 
            
            const emojiBall = Bodies.circle(xPos, -50, 25, {
                label: 'ball', density: 0.5, restitution: 0.6,
                render: { sprite: { texture: emojiCache[emoji] } }
            });
            Composite.add(world, emojiBall);
            
            setTimeout(() => Composite.remove(world, emojiBall), 10000);
        }

        // 降らす間隔を少し早めても楽しいかも！
        setInterval(spawnRandomEmoji, 400);


        // 衝突判定（ターゲットに当たったら吹っ飛ぶ）
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                const { bodyA, bodyB } = pair;
                if ((bodyA.label === 'target' || bodyB.label === 'target') && !target.isStatic === false) {
                    Body.setStatic(target, false);
                    const ball = bodyA.label === 'ball' ? bodyA : bodyB;
                    Body.setVelocity(target, { x: (target.position.x - ball.position.x)*5, y: -20 });
                }
            });
        });

        // 画面外にいったら復活
        Events.on(engine, 'afterUpdate', () => {
            if (target.position.y > height + 200 || target.position.x < -100 || target.position.x > width + 100) {
                Body.setStatic(target, true);
                Body.setPosition(target, { x: width/2, y: height-100 });
                Body.setAngle(target, 0);
                Body.setVelocity(target, {x:0, y:0});
            }
        });

        // ウィンドウサイズ変更対応
        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
